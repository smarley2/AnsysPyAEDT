name: Import KDM catalog

on:
  push:
    branches:
      - agent/import-all-magnetics-powder-toroids
    paths:
      - tools/scrape_kdm_powder_toroids.py
      - .github/workflows/import-kdm-catalog.yml

permissions:
  contents: write

jobs:
  import:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/import-all-magnetics-powder-toroids
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install import dependencies
        run: python -m pip install --disable-pip-version-check requests beautifulsoup4 pyyaml jsonschema

      - name: Compile scraper
        run: python -m compileall -q tools/scrape_kdm_powder_toroids.py

      - name: Scrape KDM catalog
        run: python tools/scrape_kdm_powder_toroids.py

      - name: Validate schema and SQLite build
        run: |
          python tools/build_catalog.py --out /tmp/catalog.sqlite
          python - <<'PY'
          import json
          from pathlib import Path
          summary = json.loads(Path('artifacts/kdm-scrape-summary.json').read_text())
          assert summary['totalRecords'] > 0
          print(json.dumps(summary, indent=2))
          PY

      - name: Upload generated data for inspection
        uses: actions/upload-artifact@v4
        with:
          name: kdm-catalog-import
          path: |
            catalog/cores/kdm-powder.yaml
            artifacts/kdm-scrape-summary.json

      - name: Commit validated catalog
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add catalog/cores/kdm-powder.yaml
          if git diff --cached --quiet; then
            echo 'No catalog changes to commit.'
            exit 0
          fi
          git commit -m 'data: import KDM powder toroid catalog'
          git push origin HEAD:agent/import-all-magnetics-powder-toroids
