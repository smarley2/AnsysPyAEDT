name: Import KDM catalog

on:
  push:
    branches:
      - agent/import-all-magnetics-powder-toroids
    paths:
      - tools/scrape_kdm_powder_toroids.py
      - .github/workflows/import-kdm-catalog.yml
  pull_request:
    branches:
      - main
    paths:
      - tools/scrape_kdm_powder_toroids.py
      - .github/workflows/import-kdm-catalog.yml

permissions:
  contents: write

jobs:
  import:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/import-all-magnetics-powder-toroids
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install import dependencies
        run: python -m pip install --disable-pip-version-check requests beautifulsoup4 pyyaml jsonschema

      - name: Scrape KDM catalog
        id: scrape
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python tools/scrape_kdm_powder_toroids.py 2>&1 | tee /tmp/kdm-import.log

      - name: Upload import diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kdm-import-diagnostics
          path: |
            /tmp/kdm-import.log
            artifacts/kdm-scrape-summary.json
          if-no-files-found: warn

      - name: Fail when scraping failed
        if: steps.scrape.outcome == 'failure'
        run: exit 1

      - name: Validate generated catalog
        run: |
          python tools/build_catalog.py --out /tmp/catalog.sqlite
          cat artifacts/kdm-scrape-summary.json

      - name: Commit generated catalog
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add catalog/cores/kdm-powder.yaml
          if git diff --cached --quiet; then
            echo 'No catalog changes to commit.'
            exit 0
          fi
          git commit -m 'data: import KDM powder toroid catalog'
          git push origin HEAD:agent/import-all-magnetics-powder-toroids
