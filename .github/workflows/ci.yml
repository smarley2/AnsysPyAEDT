name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install --upgrade pip
      # ui extra pulls in PySide6 so mypy resolves real Qt types; without it
      # QQuick3DGeometry/QObject degrade to Any and strict-mode subclassing
      # checks fail on ui/preview_geometry.py (green locally, red in CI).
      - run: python -m pip install -e ".[dev,ui]"
      - run: python -m ruff check .
      - run: python -m mypy src tools
      - run: python -m tools.check_architecture

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    env:
      QT_QPA_PLATFORM: offscreen
      QSG_RHI_BACKEND: software
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install Linux UI runtime
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libegl1
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,ui]"
      - run: python -m pytest -m "not aedt and not femm" --cov=inductor_designer --cov-report=xml --cov-report=term-missing
